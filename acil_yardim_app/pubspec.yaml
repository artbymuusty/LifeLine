name: acil_yardim_app
description: Acil yardım uygulaması
publish_to: 'none' # private package

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  package_info_plus: ^4.2.0
  sqflite: ^2.3.0+1
  path: ^1.9.0

  # State management
  provider: ^6.0.5
  
  # HTTP
  http: ^0.13.0

  # Harita ve konum
  google_maps_flutter: ^2.2.0
  geolocator: ^9.0.0

  # Yazı tipleri
  google_fonts: ^3.0.1

  # iOS ikonları
  cupertino_icons: ^1.0.8

  # Firebase
  shared_preferences: ^2.0.15
  
  # SQLite
  sqflite_common_ffi: ^2.3.5
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.2.7

flutter_native_splash:
   color: "#ffffff"           # Splash arka plan rengi
   image: assets/images/splash.png
   android: true
   ios: true


flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/icon_1.png"   # ← fix to the same path

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash.png
    - assets/images/boy_icon.png
    - assets/images/girl_icon.png
    - assets/images/icon_1.png 

  fonts:
    - family: DancingScript
      fonts:
        - asset: assets/fonts/helvetica.ttf
    - family: AUGUSTUS
      fonts:
        - asset: assets/fonts/augustus.ttf
